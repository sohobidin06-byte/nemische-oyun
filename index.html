<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Немисче Battle Room</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --navy: #1a237e; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            /* СИЗ ТАНДАГАН СҮРӨТ УШУЛ ЖЕРДЕ */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://www.shutterstock.com/image-vector/deutsch-translation-german-learning-online-260nw-1897882375.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0; 
            padding: 10px; 
            color: #333;
        }

        .screen { 
            display: none; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 25px; 
            max-width: 400px; 
            margin: 20px auto; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
        }

        .active { display: block; }
        
        input { width: 85%; padding: 12px; margin: 10px; border-radius: 12px; border: 1px solid #ddd; font-size: 18px; text-align: center; outline: none; }
        
        button { padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin: 5px; transition: 0.3s; }
        
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        
        .lang-btn { background: #eee; color: #333; width: 45%; }
        .lang-active { background: #4caf50; color: white; }

        .battle-field { height: 130px; background: rgba(255,255,255,0.7); border-radius: 20px; margin: 15px 0; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.5); }
        
        #rope-group { position: absolute; width: 100%; transition: 0.5s; display: flex; justify-content: center; font-size: 55px; }

        .quiz-card { background: var(--navy); color: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        
        .game-timer { color: white; font-weight: bold; font-size: 22px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); margin-bottom: 5px; }
        .word-count { color: #fff; font-size: 14px; margin-bottom: 10px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .share-box { margin-top: 15px; padding: 10px; background: #e8f5e9; border-radius: 10px; font-size: 13px; border: 1px dashed #4caf50; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <h2 style="color:var(--navy)">Willkommen!</h2>
        <p>Тилди тандаңыз:</p>
        <button id="btn-kg" class="lang-btn lang-active" onclick="setLang('kg')">Кыргызча</button>
        <button id="btn-ru" class="lang-btn" onclick="setLang('ru')">Русский</button>
        <hr style="margin: 20px 0; opacity: 0.1;">
        
        <input type="text" id="user-name" placeholder="Атыңызды жазыңыз">
        <input type="text" id="room-id" placeholder="Бөлмө коду (мис: 123)">
        
        <div id="share-link-area" class="share-box" style="display:none;">
            Бул кодду досторго жөнөтүңүз:<br>
            <button onclick="copyShareLink()" style="background:#4caf50; color:white; font-size:12px; padding:5px 10px; margin-top:5px;">Шилтемени көчүрүү 🔗</button>
        </div>

        <br>
        <button class="btn-blue" onclick="startApp(1)">Көк топко кир</button>
        <button class="btn-red" onclick="startApp(2)">Кызыл топко кир</button>
    </div>

    <div id="screen-game" class="screen-ui" style="display:none;">
        <div class="game-timer">⏳ <span id="main-clock">06:00</span></div>
        <div class="word-count">Сөздөр: <b id="total-words-display">0</b> | Калды: <b id="q-timer">10</b>с</div>
        
        <div class="screen" class="active" style="display:block; margin-top:0;">
            <div class="battle-field">
                <div id="rope-group">🧑🏻‍💼 🟦—🟥 👩🏻‍💼</div>
            </div>

            <div class="quiz-card">
                <h3 id="question" style="font-size: 24px;">Жүктөлүүдө...</h3>
                <input type="text" id="answer" placeholder="Жоопту жаз..." autocomplete="off">
                <button style="background:#4caf50; color:white; width:90%; font-size:20px;" onclick="check()">GO!</button>
            </div>

            <div style="display:flex; justify-content: space-around; margin-top:15px; font-weight:bold; font-size:18px;">
                <div style="color:var(--blue)">Көк: <span id="s1">0</span></div>
                <div style="color:var(--red)">Кызыл: <span id="s2">0</span></div>
            </div>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h2 style="color:var(--navy)">Оюн бүттү!</h2>
        <h1 id="winner-text" style="font-size:28px">---</h1>
        <div style="background:#f9f9f9; padding:15px; border-radius:15px; margin:20px 0;">
            <p>Жалпы көрсөтүлгөн сөздөр: <b id="final-total">0</b></p>
            <hr>
            <p style="color:var(--blue)">Көк топ (туура): <b id="final-s1">0</b></p>
            <p style="color:var(--red)">Кызыл топ (туура): <b id="final-s2">0</b></p>
        </div>
        <button class="btn-blue" onclick="location.reload()" style="width:100%">Кайра баштоо</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://germangame-b5626-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        let db, myTeam, roomPath;
        let qTimerInterval;
        let timeLeft = 10;
        let gameTime = 360; 
        let currentWordIndex = -1;
        let selectedLang = 'kg';

        const words = [
            {kg: "Мышык", ru: "Кошка", n: "Katze"}, {kg: "Энергия", ru: "Энергия", n: "Energie"},
            {kg: "Шып", ru: "Потолок", n: "Decke"}, {kg: "Таштанды", ru: "Мусор", n: "Müll"},
            {kg: "Келишим", ru: "Договор", n: "Vertrag"}, {kg: "Китеп", ru: "Книга", n: "Buch"},
            {kg: "Мектеп", ru: "Школа", n: "Schule"}, {kg: "Убакыт", ru: "Время", n: "Zeit"},
            {kg: "Алма", ru: "Яблоко", n: "Apfel"}, {kg: "Суу", ru: "Вода", n: "Wasser"}
        ];

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomFromUrl = urlParams.get('room');
            if (roomFromUrl) {
                document.getElementById('room-id').value = roomFromUrl;
                document.getElementById('share-link-area').style.display = 'block';
            }
        };

        document.getElementById('room-id').oninput = function() {
            document.getElementById('share-link-area').style.display = this.value.length > 0 ? 'block' : 'none';
        };

        function copyShareLink() {
            const roomCode = document.getElementById('room-id').value;
            const shareUrl = window.location.origin + window.location.pathname + "?room=" + roomCode;
            navigator.clipboard.writeText(shareUrl).then(() => alert("Шилтеме көчүрүлдү!"));
        }

        function setLang(l) {
            selectedLang = l;
            document.getElementById('btn-kg').className = l === 'kg' ? 'lang-btn lang-active' : 'lang-btn';
            document.getElementById('btn-ru').className = l === 'ru' ? 'lang-btn lang-active' : 'lang-btn';
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'de-DE';
            utter.rate = 0.9;
            window.speechSynthesis.speak(utter);
        }

        function startApp(team) {
            let user = document.getElementById('user-name').value.trim();
            roomPath = document.getElementById('room-id').value.trim();
            if(!user || !roomPath) return alert("Атты жана кодду жазыңыз!");
            myTeam = team;
            db = firebase.database().ref('rooms/' + roomPath);
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-game').style.display = 'block';
            initGame();
        }

        function initGame() {
            db.once('value', snap => {
                if(!snap.exists()) {
                    db.set({ pos: 0, s1: 0, s2: 0, totalWords: 0, startTime: Date.now() });
                }
            });

            db.on('value', snap => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('s1').innerText = data.s1 || 0;
                document.getElementById('s2').innerText = data.s2 || 0;
                document.getElementById('total-words-display').innerText = data.totalWords || 0;
                document.getElementById('rope-group').style.transform = `translateX(${data.pos}px)`;
                
                let elapsed = Math.floor((Date.now() - data.startTime) / 1000);
                let remaining = gameTime - elapsed;
                if(remaining <= 0) endGame(data);
                else updateMainClock(remaining);
            });
            nextWord();
        }

        function startQuestionTimer() {
            clearInterval(qTimerInterval);
            timeLeft = 10;
            document.getElementById('q-timer').innerText = timeLeft;
            qTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('q-timer').innerText = timeLeft;
                if(timeLeft <= 0) { speak("Zeit um!"); nextWord(); }
            }, 1000);
        }

        function nextWord() {
            db.once('value').then(snap => {
                let data = snap.val();
                if(data) db.update({ totalWords: (data.totalWords || 0) + 1 });
            });
            let newIndex;
            do { newIndex = Math.floor(Math.random() * words.length); } 
            while (newIndex === currentWordIndex);
            currentWordIndex = newIndex;
            document.getElementById("question").innerText = selectedLang === 'kg' ? words[currentWordIndex].kg : words[currentWordIndex].ru;
            document.getElementById("answer").value = "";
            document.getElementById("answer").focus();
            startQuestionTimer();
        }

        function check() {
            let val = document.getElementById("answer").value.trim().toLowerCase();
            let correct = words[currentWordIndex].n.toLowerCase();
            if(val === correct) {
                speak("Richtig!");
                db.once('value').then(snap => {
                    let data = snap.val();
                    if(myTeam === 1) { data.s1++; data.pos -= 40; }
                    else { data.s2++; data.pos += 40; }
                    db.update(data);
                    nextWord();
                });
            } else {
                speak("Falsch!");
                alert("Ката! Туура жооп: " + words[currentWordIndex].n);
                nextWord();
            }
        }

        function updateMainClock(sec) {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('main-clock').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function endGame(data) {
            clearInterval(qTimerInterval);
            db.off();
            document.getElementById('screen-game').style.display = 'none';
            document.getElementById('screen-result').classList.add('active');
            document.getElementById('final-s1').innerText = data.s1;
            document.getElementById('final-s2').innerText = data.s2;
            document.getElementById('final-total').innerText = data.totalWords;
            document.getElementById('winner-text').innerText = data.s1 > data.s2 ? "Көк топ жеңди! 🎉" : (data.s2 > data.s1 ? "Кызыл топ жеңди! 🎉" : "Тең чыгуу!");
        }
    </script>
</body>
</html>
