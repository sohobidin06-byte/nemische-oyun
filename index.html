<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Немисче Battle Room</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --navy: #1a237e; --green: #2ecc71; --yellow: #f1c40f; }
        body { 
            font-family: 'Segoe UI', sans-serif; text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=2070'); 
            background-size: cover; background-attachment: fixed; margin: 0; padding: 10px; color: #333;
        }
        .screen { display: none; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 25px; border-radius: 30px; max-width: 450px; margin: 15px auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3); }
        .active { display: block; }
        input, textarea { width: 90%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ccc; font-size: 16px; text-align: center; }
        button { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; width: 100%; margin-bottom: 5px; }
        .btn-red { background: var(--red); color: white; width: 100%; }
        .ai-badge { background: #000; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; font-size: 11px; letter-spacing: 2px; margin-bottom: 15px; }
        
        .admin-section { display: none; background: #fffde7; border: 3px dashed var(--yellow); padding: 20px; border-radius: 25px; margin-top: 20px; }
        .btn-share { background: #9b59b6; color: white; width: 100%; margin-top: 10px; }
        .quiz-card { background: var(--navy); color: white; padding: 25px; border-radius: 25px; }
        #rope-display { font-size: 45px; margin: 20px 0; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="ai-badge">GEMINI AI SYSTEM</div>
        <h2 style="color:var(--navy); margin:0;">Willkommen! 🇩🇪</h2>
        
        <input type="text" id="user-name" placeholder="Атыңыз">
        <input type="text" id="room-id" placeholder="Бөлмө коду">
        
        <div style="margin-top:10px;">
            <button class="btn-blue" onclick="startApp(1)">Көк топ 🟦</button>
            <button class="btn-red" onclick="startApp(2)">Кызыл топ 🟥</button>
        </div>

        <div id="admin-panel" class="admin-section">
            <h3 style="margin:0; color:#f57f17;">🛠 Админ Башкаруу</h3>
            
            <button class="btn-share" onclick="copyInviteLink()">🔗 Оюн шилтемесин көчүрүү</button>
            
            <hr style="margin:15px 0; opacity:0.3;">
            <p style="font-size: 12px;">Сөздөрдү чаптаңыз: (Формат: Немисче Кыргызча Орусча)</p>
            <textarea id="smart-import-area" rows="6" placeholder="Haus Үй Дом&#10;Katze Мышык Кошка"></textarea>
            <button style="background:var(--navy); color:white; width:100%;" onclick="processSmartImport()">БАЗАГА ЖҮКТӨӨ ✅</button>
            <p id="status" style="font-size:13px; color:green; margin-top:10px; font-weight:bold;"></p>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div style="font-size: 24px; font-weight: bold;">⏳ <span id="main-clock">06:00</span></div>
        <div id="rope-display">🧑🏻‍💼 🟦—🟥 👩🏻‍💼</div>
        <div class="quiz-card">
            <h2 id="question-text" style="font-size: 28px;">...</h2>
            <p style="font-size:12px;">Таймер: <span id="q-timer">20</span>с</p>
            <input type="text" id="answer-input" placeholder="Немисчесин жаз..." autocomplete="off">
            <button style="background:var(--green); color:white; width:100%; font-size:20px;" onclick="check()">ЖӨНӨТҮҮ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://germangame-b5626-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myTeam, roomPath, currentWord, qTimerInterval, gameTime = 360, wordsList = [];
        const ADMIN_PASSWORD = "111"; // Ушул жерге өзүңүз каалаган паролду жазыңыз

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            // Эгер ?mode=admin болсо пароль сурайт
            if (params.get('mode') === 'admin') {
                let pass = prompt("Админ паролду киргизиңиз:");
                if (pass === ADMIN_PASSWORD) {
                    document.getElementById('admin-panel').style.display = 'block';
                } else {
                    alert("Пароль туура эмес!");
                    window.location.href = window.location.pathname; // Башкы бетке кайтарат
                }
            }
            // Эгер шилтемеде бөлмө коду болсо, автоматтык түрдө жазылат
            if (params.get('room')) {
                document.getElementById('room-id').value = params.get('room');
            }
        };

        db.ref('dictionary').on('value', (snap) => {
            const data = snap.val();
            wordsList = data ? Object.values(data) : [];
        });

        // ШИЛТЕМЕ КӨЧҮРҮҮ
        function copyInviteLink() {
            let room = document.getElementById('room-id').value.trim();
            if (!room) return alert("Алгач бөлмө кодун жазыңыз!");
            
            let link = window.location.origin + window.location.pathname + "?room=" + room;
            navigator.clipboard.writeText(link).then(() => {
                alert("Шилтеме көчүрүлдү! Эми муну оюнчуларга жиберсеңиз болот: " + link);
            });
        }

        function processSmartImport() {
            const rawText = document.getElementById('smart-import-area').value.trim();
            if (!rawText) return alert("Текст бош!");
            const lines = rawText.split('\n');
            let addedCount = 0;
            lines.forEach(line => {
                const parts = line.replace(/[-]/g, ' ').split(/\s+/).filter(p => p.length > 0);
                if (parts.length >= 3) {
                    db.ref('dictionary').push({ n: parts[0], kg: parts[1], ru: parts.slice(2).join(' ') });
                    addedCount++;
                }
            });
            document.getElementById('status').innerText = `${addedCount} сөз кошулду! 🎉`;
            document.getElementById('smart-import-area').value = "";
        }

        function startApp(team) {
            roomPath = document.getElementById('room-id').value.trim();
            if(!roomPath || wordsList.length === 0) return alert("Маалымат жетишсиз!");
            myTeam = team;
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            db.ref('rooms/' + roomPath).on('value', snap => {
                const data = snap.val() || { s1:0, s2:0, pos:0, startTime: Date.now() };
                document.getElementById('rope-display').style.transform = `translateX(${data.pos}px)`;
                let rem = gameTime - Math.floor((Date.now() - data.startTime) / 1000);
                if(rem <= 0) location.reload(); else updateClock(rem);
            });
            nextWord();
        }

        function nextWord() {
            currentWord = wordsList[Math.floor(Math.random() * wordsList.length)];
            document.getElementById('question-text').innerText = currentWord.kg;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
            let timeLeft = 20;
            clearInterval(qTimerInterval);
            qTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('q-timer').innerText = timeLeft;
                if(timeLeft <= 0) nextWord();
            }, 1000);
        }

        function check() {
            let ans = document.getElementById('answer-input').value.trim().toLowerCase();
            if(ans === currentWord.n.toLowerCase()) {
                db.ref('rooms/' + roomPath).once('value').then(snap => {
                    let d = snap.val() || { s1:0, s2:0, pos:0, startTime: Date.now() };
                    if(myTeam === 1) { d.s1++; d.pos -= 35; } else { d.s2++; d.pos += 35; }
                    db.ref('rooms/' + roomPath).update(d);
                    nextWord();
                });
            } else { alert("Туурасы: " + currentWord.n); nextWord(); }
        }

        function updateClock(s) {
            let m = Math.floor(s/60), sec = s%60;
            document.getElementById('main-clock').innerText = `${m}:${sec<10?'0':''}${sec}`;
        }
    </script>
</body>
</html>
