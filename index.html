<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Немисче Battle - Pure Words</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --navy: #1a237e; --green: #2ecc71; --yellow: #f1c40f; }
        body { 
            font-family: 'Segoe UI', sans-serif; text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=2070'); 
            background-size: cover; background-attachment: fixed; margin: 0; padding: 10px; color: #333;
        }
        .screen { display: none; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); padding: 25px; border-radius: 30px; max-width: 450px; margin: 15px auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .active { display: block; }
        input, textarea, select { width: 90%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 2px solid #ddd; font-size: 16px; text-align: center; }
        button { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; width: 100%; margin-bottom: 8px; }
        .btn-red { background: var(--red); color: white; width: 100%; }
        .ai-badge { background: #000; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; font-size: 11px; letter-spacing: 2px; margin-bottom: 15px; }
        .admin-section { display: none; background: #fffde7; border: 3px dashed var(--yellow); padding: 20px; border-radius: 25px; margin-top: 20px; }
        .quiz-card { background: var(--navy); color: white; padding: 25px; border-radius: 25px; }
        #rope-display { font-size: 50px; margin: 20px 0; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="ai-badge">GEMINI AI SYSTEM</div>
        <h2 style="color:var(--navy); margin:0;">Willkommen! 🇩🇪</h2>
        
        <input type="text" id="user-name" placeholder="Атыңыз">
        <input type="text" id="room-id" placeholder="Бөлмө коду">
        
        <p style="margin: 10px 0 5px; font-weight: bold;">Суроо тили:</p>
        <select id="lang-choice">
            <option value="kg">Кыргызча суроолор 🇰🇬</option>
            <option value="ru">Орусча суроолор 🇷🇺</option>
        </select>
        
        <div style="margin-top:15px;">
            <button class="btn-blue" onclick="startApp(1)">Көк топ 🟦</button>
            <button class="btn-red" onclick="startApp(2)">Кызыл топ 🟥</button>
        </div>

        <div id="admin-panel" class="admin-section">
            <h3 style="color:#f57f17; margin-top:0;">🚀 Катуу Сортировка</h3>
            <p style="font-size: 11px; color: #555;">Формат: <b>Немисче,Кыргызча,Орусча</b></p>
            <textarea id="smart-import-area" rows="6" placeholder="Apfel,Алма,Яблоко"></textarea>
            <button style="background:var(--navy); color:white; width:100%;" onclick="processSmartImport()">ТАЗАЛАП БАЗАГА САKТОО ✅</button>
            <p id="status" style="font-size:13px; color:green; margin-top:10px; font-weight:bold;"></p>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">⏳ <span id="main-clock">06:00</span></div>
        <div id="rope-display">🧑🏻‍💼 🟦—🟥 👩🏻‍💼</div>
        <div class="quiz-card">
            <h2 id="question-text" style="font-size: 32px; margin: 0 0 10px 0;">...</h2>
            <p style="font-size:14px; opacity:0.8;">Таймер: <span id="q-timer">20</span>с</p>
            <input type="text" id="answer-input" placeholder="Немисчесин жаз..." autocomplete="off">
            <button style="background:var(--green); color:white; width:100%; font-size:20px; margin-top:10px;" onclick="check()">ЖӨНӨТҮҮ!</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://germangame-b5626-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myTeam, roomPath, currentWord, qTimerInterval, gameTime = 360, wordsList = [];
        let selectedLang = 'kg';
        const ADMIN_PASSWORD = "111";

        // Керексиз сөздөрдүн кара тизмеси
        const BLACKLIST = ["же", "или", "по", "и", "а", "с", "в", "от", "до", "на"];

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('mode') === 'admin') {
                let pass = prompt("Пароль:");
                if (pass === ADMIN_PASSWORD) document.getElementById('admin-panel').style.display = 'block';
            }
        };

        db.ref('dictionary').on('value', (snap) => {
            const data = snap.val();
            wordsList = data ? Object.values(data) : [];
        });

        function processSmartImport() {
            const rawText = document.getElementById('smart-import-area').value.trim();
            if (!rawText) return;
            
            const lines = rawText.split('\n');
            let addedCount = 0;

            lines.forEach(line => {
                // Бөлүү жана ар бир сөздү тазалоо
                let parts = line.split(/[,,--,,::]/).map(p => p.trim());
                
                // Эгер сапта 3төн аз бөлүк болсо же керексиз сөздөр болсо өткөрүп жиберет
                if (parts.length >= 3) {
                    const de = parts[0];
                    const kg = parts[1];
                    const ru = parts[2];

                    // Фильтр: эгер немисчеси же кыргызчасы кара тизмедеги сөз болсо кошпойт
                    if (!BLACKLIST.includes(de.toLowerCase()) && !BLACKLIST.includes(kg.toLowerCase())) {
                        db.ref('dictionary').push({ n: de, kg: kg, ru: ru });
                        addedCount++;
                    }
                }
            });
            document.getElementById('status').innerText = `${addedCount} таза сөз сакталды! 🎉`;
            document.getElementById('smart-import-area').value = "";
        }

        function startApp(team) {
            roomPath = document.getElementById('room-id').value.trim();
            selectedLang = document.getElementById('lang-choice').value;
            if(!roomPath || wordsList.length === 0) return alert("Ката!");
            myTeam = team;
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            db.ref('rooms/' + roomPath).on('value', snap => {
                const data = snap.val() || { s1:0, s2:0, pos:0, startTime: Date.now() };
                document.getElementById('rope-display').style.transform = `translateX(${data.pos}px)`;
                let rem = gameTime - Math.floor((Date.now() - data.startTime) / 1000);
                if(rem <= 0) location.reload(); else updateClock(rem);
            });
            nextWord();
        }

        function nextWord() {
            // Эгер базада сөз жок болсо ката бербеши үчүн текшерүү
            if (wordsList.length === 0) return;
            currentWord = wordsList[Math.floor(Math.random() * wordsList.length)];
            document.getElementById('question-text').innerText = (selectedLang === 'kg') ? currentWord.kg : currentWord.ru;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
            let timeLeft = 20;
            clearInterval(qTimerInterval);
            qTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('q-timer').innerText = timeLeft;
                if(timeLeft <= 0) nextWord();
            }, 1000);
        }

        function check() {
            let ans = document.getElementById('answer-input').value.trim().toLowerCase();
            if(ans === currentWord.n.toLowerCase()) {
                db.ref('rooms/' + roomPath).once('value').then(snap => {
                    let d = snap.val() || { s1:0, s2:0, pos:0, startTime: Date.now() };
                    if(myTeam === 1) { d.s1++; d.pos -= 40; } else { d.s2++; d.pos += 40; }
                    db.ref('rooms/' + roomPath).update(d);
                    nextWord();
                });
            } else { alert("Туурасы: " + currentWord.n); nextWord(); }
        }

        function updateClock(s) {
            let m = Math.floor(s/60), sec = s%60;
            document.getElementById('main-clock').innerText = `${m}:${sec<10?'0':''}${sec}`;
        }
    </script>
</body>
</html>
