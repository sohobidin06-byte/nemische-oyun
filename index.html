<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Немисче Battle Room</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --navy: #1a237e; --green: #2ecc71; }
        body { 
            font-family: 'Segoe UI', sans-serif; text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=2070'); 
            background-size: cover; background-attachment: fixed; margin: 0; padding: 10px; color: #333;
        }
        .screen { display: none; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 25px; border-radius: 30px; max-width: 400px; margin: 20px auto; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .active { display: block; }
        input { width: 85%; padding: 12px; margin: 10px; border-radius: 15px; border: 1px solid #ccc; font-size: 18px; text-align: center; }
        button { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin: 5px; transition: 0.3s transform; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        .ai-badge { background: #000; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; font-size: 12px; letter-spacing: 2px; margin-bottom: 10px; }
        
        /* АДМИН ПАНЕЛЬ СТИЛИ */
        .admin-section { display: none; background: #fffde7; border: 2px dashed #fbc02d; padding: 15px; border-radius: 20px; margin-top: 20px; }
        .btn-add { background: var(--green); color: white; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="ai-badge">GEMINI AI SYSTEM</div>
        <h2 style="color:var(--navy)">Willkommen! 🇩🇪</h2>
        
        <input type="text" id="user-name" placeholder="Атыңыз">
        <input type="text" id="room-id" placeholder="Бөлмө коду">
        
        <div style="margin-top:10px;">
            <button class="btn-blue" style="width:100%" onclick="startApp(1)">Көк топ 🟦</button>
            <button class="btn-red" style="width:100%" onclick="startApp(2)">Кызыл топ 🟥</button>
        </div>

        <div id="admin-panel" class="admin-section">
            <h3 style="margin:0; color:#f57f17;">➕ Жаңы сөз кошуу</h3>
            <input type="text" id="new-de" placeholder="Немисчеси">
            <input type="text" id="new-kg" placeholder="Кыргызчасы">
            <input type="text" id="new-ru" placeholder="Орусчасы">
            <button class="btn-add" onclick="addNewWord()">БАЗАГА САКТОО 📥</button>
            <p id="status" style="font-size:12px; color:green;"></p>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div style="font-size: 22px; font-weight: bold;">⏳ <span id="main-clock">06:00</span></div>
        <div style="margin: 10px 0; font-size: 40px;" id="rope-display">🧑🏻‍💼 🟦—🟥 👩🏻‍💼</div>
        <div style="background:var(--navy); color:white; padding:20px; border-radius:20px;">
            <h2 id="question-text">Жүктөлүүдө...</h2>
            <p style="font-size:12px;">Таймер: <span id="q-timer">20</span>с</p>
            <input type="text" id="answer-input" placeholder="Жооп..." autocomplete="off">
            <button style="background:var(--green); color:white; width:100%;" onclick="check()">ЖӨНӨТҮҮ</button>
        </div>
    </div>

    <script>
        // БУЛ ЖЕРГЕ ӨЗҮҢҮЗДҮН FIREBASE DATABASE URL'ди КОЮҢУЗ
        const firebaseConfig = { databaseURL: "https://germangame-b5626-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myTeam, roomPath, currentWord, qTimerInterval, gameTime = 360;
        let wordsList = [];

        // 1. АДМИНДИ ТЕКШЕРҮҮ (Шилтемеде ?mode=admin барбы?)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('mode') === 'admin') {
                document.getElementById('admin-panel').style.display = 'block';
            }
        };

        // 2. БАЗАДАН СӨЗДӨРДҮ АЛУУ (Дайыма жаңыланып турат)
        db.ref('dictionary').on('value', (snap) => {
            const data = snap.val();
            wordsList = data ? Object.values(data) : [];
        });

        // 3. СӨЗ КОШУУ ФУНКЦИЯСЫ
        function addNewWord() {
            const de = document.getElementById('new-de').value.trim();
            const kg = document.getElementById('new-kg').value.trim();
            const ru = document.getElementById('new-ru').value.trim();

            if(!de || !kg || !ru) return alert("Толук жазыңыз!");

            db.ref('dictionary').push({ n: de, kg: kg, ru: ru }).then(() => {
                document.getElementById('status').innerText = "Сөз базага кошулду ✅";
                document.getElementById('new-de').value = "";
                document.getElementById('new-kg').value = "";
                document.getElementById('new-ru').value = "";
                setTimeout(() => document.getElementById('status').innerText = "", 3000);
            });
        }

        // 4. ОЮНДУ БАШТОО
        function startApp(team) {
            roomPath = document.getElementById('room-id').value.trim();
            if(!roomPath) return alert("Бөлмө кодун жазыңыз!");
            myTeam = team;
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            
            // Базадагы оюн абалын байкоо
            db.ref('rooms/' + roomPath).on('value', snap => {
                const data = snap.val() || { s1:0, s2:0, pos:0, startTime: Date.now() };
                document.getElementById('rope-display').style.transform = `translateX(${data.pos}px)`;
                
                let elapsed = Math.floor((Date.now() - data.startTime) / 1000);
                let rem = gameTime - elapsed;
                if(rem <= 0) endGame(); else updateClock(rem);
            });
            nextWord();
        }

        function nextWord() {
            if(wordsList.length === 0) return alert("Базада сөз жок! Админ режимден сөз кошуңуз.");
            currentWord = wordsList[Math.floor(Math.random() * wordsList.length)];
            document.getElementById('question-text').innerText = currentWord.kg; // Кыргызчасы чыгат
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
            
            // 20 секунддук таймер
            let timeLeft = 20;
            clearInterval(qTimerInterval);
            qTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('q-timer').innerText = timeLeft;
                if(timeLeft <= 0) nextWord();
            }, 1000);
        }

        function check() {
            let ans = document.getElementById('answer-input').value.trim().toLowerCase();
            if(ans === currentWord.n.toLowerCase()) {
                db.ref('rooms/' + roomPath).once('value').then(snap => {
                    let d = snap.val() || { s1:0, s2:0, pos:0, startTime: Date.now() };
                    if(myTeam === 1) { d.s1++; d.pos -= 30; } else { d.s2++; d.pos += 30; }
                    db.ref('rooms/' + roomPath).update(d);
                    nextWord();
                });
            } else {
                alert("Ката! Жообу: " + currentWord.n);
                nextWord();
            }
        }

        function updateClock(s) {
            let min = Math.floor(s/60), sec = s%60;
            document.getElementById('main-clock').innerText = `${min}:${sec<10?'0':''}${sec}`;
        }

        function endGame() {
            alert("Оюн бүттү!");
            location.reload();
        }
    </script>
</body>
</html>
