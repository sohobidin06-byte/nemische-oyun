<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Battle Pro - AI System</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --primary: #6366f1; --secondary: #f43f5e; --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.15); --success: #22c55e;
        }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 100%; max-width: 480px; padding: 20px;
        }
        .card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 32px;
            padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center; display: none;
        }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 28px; margin-bottom: 20px; letter-spacing: -1px; }
        input, select, textarea {
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2);
            color: white; font-size: 16px; outline: none;
        }
        button {
            width: 100%; padding: 15px; margin-top: 10px; border-radius: 16px;
            border: none; cursor: pointer; font-weight: 700; font-size: 16px;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); }
        .btn-secondary { background: var(--secondary); color: white; }
        
        /* Battle Area */
        #rope-wrapper {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin: 20px 0;
            position: relative; overflow: hidden;
        }
        #rope { font-size: 40px; display: flex; justify-content: center; gap: 10px; transition: 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .timer-badge { font-size: 20px; font-weight: bold; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 12px; }
        .quiz-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 24px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .admin-panel { background: #fffde7; color: #333; padding: 20px; border-radius: 24px; margin-top: 20px; border: 2px dashed #facc15; }
        .admin-panel input, .admin-panel textarea { color: #333; border: 1px solid #ddd; background: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-login" class="card active">
        <div style="font-size: 50px;">🇩🇪</div>
        <h1>Deutsch Battle</h1>
        <input type="text" id="user-name" placeholder="Атыңызды жазыңыз">
        <input type="text" id="room-id" placeholder="Бөлмө коду (мис: 777)">
        
        <label style="font-size: 12px; opacity: 0.7;">Суроо кайсы тилде чыксын?</label>
        <select id="lang-choice">
            <option value="kg">Кыргызча 🇰🇬</option>
            <option value="ru">Орусча 🇷🇺</option>
        </select>

        <button class="btn-primary" onclick="joinGame(1)">Көк топко кир 🟦</button>
        <button class="btn-secondary" onclick="joinGame(2)">Кызыл топко кир 🟥</button>

        <div id="admin-area" style="display:none;" class="admin-panel">
            <h3 style="margin:0;">🛠 Админ Панель</h3>
            <textarea id="import-text" rows="5" placeholder="Haus, Үй, Дом..."></textarea>
            <button class="btn-primary" style="background:#0f172a" onclick="smartImport()">Сөздөрдү Сорттоп Жүктөө</button>
            <button class="btn-primary" style="background:#4f46e5; margin-top:5px;" onclick="startGame()">Оюнду Баштоо 🚀</button>
            <p id="admin-status" style="font-size:12px; font-weight:bold;"></p>
        </div>
    </div>

    <div id="screen-game" class="card">
        <div class="timer-badge">⏳ <span id="game-timer">06:00</span></div>
        
        <div id="rope-wrapper">
            <div id="rope">🟦——⚖️——🟥</div>
        </div>

        <div class="quiz-box">
            <h2 id="q-text" style="font-size: 32px; margin: 0;">...</h2>
            <p style="opacity:0.6; font-size: 14px;">Суроо таймери: <span id="q-timer">20</span>с</p>
            <input type="text" id="ans-input" placeholder="Немисчесин жаз..." autocomplete="off">
            <button class="btn-primary" style="background:var(--success)" onclick="submitAnswer()">ЖӨНӨТҮҮ</button>
        </div>
    </div>
</div>

<script>
    // 1. FIREBASE CONFIG (Сиздин базаңыз)
    const firebaseConfig = { databaseURL: "https://germangame-b5626-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myTeam, roomID, currentWord, words = [], qTimer;
    const ADMIN_PASS = "111";

    // 2. БАШТАПКЫ ЖҮКТӨӨ
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('mode') === 'admin') {
            if(prompt("Пароль:") === ADMIN_PASS) document.getElementById('admin-area').style.display = 'block';
        }
        if(urlParams.get('room')) document.getElementById('room-id').value = urlParams.get('room');
    };

    // 3. SMART IMPORT (СОРТИРОВКА)
    function smartImport() {
        const text = document.getElementById('import-text').value.trim();
        if(!text) return;

        const lines = text.split('\n');
        let count = 0;
        lines.forEach(line => {
            // Үтүр, сызыкча же кош чекит менен бөлүү
            let p = line.split(/[,,--,,::]/).map(i => i.trim());
            
            if(p.length >= 2) {
                // REGEX: Биринчи сөздө латын тамгалары (Немисче) болушун текшерет
                const isGerman = /^[A-Za-zÄäÖöÜüß\s]+$/.test(p[0]);
                if(isGerman) {
                    db.ref('dictionary').push({ de: p[0], kg: p[1], ru: p[2] || p[1] });
                    count++;
                }
            }
        });
        document.getElementById('admin-status').innerText = `${count} сөз тазаланып жүктөлдү!`;
        document.getElementById('import-text').value = "";
    }

    // 4. ОЮНГА КИРҮҮ
    function joinGame(team) {
        roomID = document.getElementById('room-id').value.trim();
        if(!roomID) return alert("Код жазыңыз!");
        myTeam = team;

        // Базадан сөздөрдү алуу
        db.ref('dictionary').once('value', snap => {
            words = snap.val() ? Object.values(snap.val()) : [];
            if(words.length === 0) return alert("База бош!");
            
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            listenRoom();
            nextQuestion();
        });
    }

    function listenRoom() {
        db.ref('rooms/' + roomID).on('value', snap => {
            const data = snap.val() || { pos: 0, startTime: Date.now() };
            document.getElementById('rope').style.transform = `translateX(${data.pos}px)`;
            
            let elapsed = Math.floor((Date.now() - data.startTime) / 1000);
            let rem = 360 - elapsed;
            if(rem <= 0) { alert("Оюн бүттү!"); location.reload(); }
            updateClock(rem);
        });
    }

    function nextQuestion() {
        currentWord = words[Math.floor(Math.random() * words.length)];
        const lang = document.getElementById('lang-choice').value;
        document.getElementById('q-text').innerText = currentWord[lang];
        document.getElementById('ans-input').value = "";
        document.getElementById('ans-input').focus();

        let timeLeft = 20;
        clearInterval(qTimer);
        qTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('q-timer').innerText = timeLeft;
            if(timeLeft <= 0) nextQuestion();
        }, 1000);
    }

    function submitAnswer() {
        const ans = document.getElementById('ans-input').value.trim().toLowerCase();
        if(ans === currentWord.de.toLowerCase()) {
            db.ref('rooms/' + roomID).once('value').then(snap => {
                let d = snap.val() || { pos: 0, startTime: Date.now() };
                d.pos += (myTeam === 1) ? -45 : 45;
                db.ref('rooms/' + roomID).update(d);
                nextQuestion();
            });
        } else {
            // Ката болгондо эффект
            document.querySelector('.quiz-box').style.background = "rgba(244, 63, 94, 0.2)";
            setTimeout(() => document.querySelector('.quiz-box').style.background = "rgba(255,255,255,0.05)", 500);
        }
    }

    function updateClock(s) {
        let m = Math.floor(s/60), sec = s%60;
        document.getElementById('game-timer').innerText = `${m}:${sec<10?'0':''}${sec}`;
    }

    function startGame() {
        db.ref('rooms/' + roomID).update({ startTime: Date.now(), pos: 0 });
        alert("Оюн бардык оюнчулар үчүн жаңыланды!");
    }
</script>

</body>
</html>
