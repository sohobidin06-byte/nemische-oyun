<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Немисче Battle Room</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --navy: #1a237e; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f7f6; margin: 0; padding: 10px; }
        .screen { display: none; background: white; padding: 20px; border-radius: 20px; max-width: 400px; margin: 20px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .active { display: block; }
        input { width: 80%; padding: 12px; margin: 10px; border-radius: 10px; border: 1px solid #ccc; font-size: 18px; text-align: center; }
        button { padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin: 5px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        .timer-circle { font-size: 24px; font-weight: bold; color: var(--red); margin: 10px; }
        .game-timer { font-size: 18px; background: #eee; padding: 5px; border-radius: 10px; display: inline-block; margin-bottom: 10px; }
        .battle-field { height: 120px; background: #eee; border-radius: 15px; margin: 15px 0; position: relative; overflow: hidden; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; }
        #rope-group { position: absolute; width: 100%; transition: 0.5s; display: flex; justify-content: center; font-size: 50px; }
        .quiz-card { background: var(--navy); color: white; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <h2>Willkommen!</h2>
        <input type="text" id="user-name" placeholder="Атыңызды жазыңыз">
        <input type="text" id="room-id" placeholder="Бөлмө коду (мис: 123)">
        <br>
        <button class="btn-blue" onclick="startApp(1)">Көк топко кир</button>
        <button class="btn-red" onclick="startApp(2)">Кызыл топко кир</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-timer">Убакыт: <span id="main-clock">06:00</span></div>
        <div class="timer-circle">⏳ <span id="q-timer">10</span></div>
        
        <div class="battle-field">
            <div id="rope-group">🧑🏻‍💼 🟦—🟥 👩🏻‍💼</div>
        </div>

        <div class="quiz-card">
            <h3 id="question">Жүктөлүүдө...</h3>
            <input type="text" id="answer" placeholder="Жоопту жаз..." autocomplete="off">
            <button style="background:#4caf50; color:white; width:90%;" onclick="check()">Жөнөтүү</button>
        </div>

        <div style="display:flex; justify-content: space-around; margin-top:15px; font-weight:bold;">
            <div style="color:var(--blue)">Көк: <span id="s1">0</span></div>
            <div style="color:var(--red)">Кызыл: <span id="s2">0</span></div>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h2>Оюн бүттү!</h2>
        <h1 id="winner-text">---</h1>
        <div class="stat-box">
            <p>Көк топ: <span id="final-s1">0</span></p>
            <p>Кызыл топ: <span id="final-s2">0</span></p>
        </div>
        <button class="btn-blue" onclick="location.reload()">Кайра баштоо</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://germangame-b5626-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        let db, myTeam, userName, roomPath;
        let qTimerInterval, mainTimerInterval;
        let timeLeft = 10;
        let gameTime = 360; // 6 мүнөт
        let currentWordIndex = -1;

        const words = [
            {k: "Мышык", n: "Katze"}, {k: "Энергия", n: "Energie"},
            {k: "Шып", n: "Decke"}, {k: "Таштанды", n: "Müll"},
            {k: "Келишим", n: "Vertrag"}, {k: "Китеп", n: "Buch"}
        ];

        function startApp(team) {
            userName = document.getElementById('user-name').value.trim();
            roomPath = document.getElementById('room-id').value.trim();
            
            if(!userName || !roomPath) return alert("Атты жана кодду жазыңыз!");
            
            myTeam = team;
            db = firebase.database().ref('rooms/' + roomPath);
            
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');

            initGame();
        }

        function initGame() {
            // Базаны баштапкы абалга келтирүү (эгер биринчи адам болсо)
            db.once('value', snap => {
                if(!snap.exists()) {
                    db.set({ pos: 0, s1: 0, s2: 0, startTime: Date.now() });
                }
            });

            db.on('value', snap => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('s1').innerText = data.s1 || 0;
                document.getElementById('s2').innerText = data.s2 || 0;
                document.getElementById('rope-group').style.transform = `translateX(${data.pos}px)`;
                
                // Оюндун убактысын эсептөө
                let elapsed = Math.floor((Date.now() - data.startTime) / 1000);
                let remaining = gameTime - elapsed;
                if(remaining <= 0) endGame(data);
                updateMainClock(remaining);
            });

            nextWord();
            startQuestionTimer();
        }

        function startQuestionTimer() {
            clearInterval(qTimerInterval);
            timeLeft = 10;
            document.getElementById('q-timer').innerText = timeLeft;
            qTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('q-timer').innerText = timeLeft;
                if(timeLeft <= 0) nextWord(); 
            }, 1000);
        }

        function nextWord() {
            let newIndex;
            do { newIndex = Math.floor(Math.random() * words.length); } 
            while (newIndex === currentWordIndex);
            
            currentWordIndex = newIndex;
            document.getElementById("question").innerText = words[currentWordIndex].k;
            document.getElementById("answer").value = "";
            document.getElementById("answer").focus();
            startQuestionTimer();
        }

        function check() {
            let val = document.getElementById("answer").value.trim().toLowerCase();
            let correct = words[currentWordIndex].n.toLowerCase();

            if(val === correct) {
                db.once('value').then(snap => {
                    let data = snap.val();
                    if(myTeam === 1) { data.s1++; data.pos -= 30; }
                    else { data.s2++; data.pos += 30; }
                    db.update(data);
                    nextWord();
                });
            } else {
                alert("Ката! Туура жооп: " + words[currentWordIndex].n);
                nextWord();
            }
        }

        function updateMainClock(sec) {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('main-clock').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function endGame(data) {
            clearInterval(qTimerInterval);
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');
            document.getElementById('final-s1').innerText = data.s1;
            document.getElementById('final-s2').innerText = data.s2;
            document.getElementById('winner-text').innerText = data.s1 > data.s2 ? "Көк топ жеңди! 🎉" : "Кызыл топ жеңди! 🎉";
        }
    </script>
</body>
</html>
