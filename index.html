<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Немисче Жарыш</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --navy: #1a237e; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f7f6; margin: 0; padding: 15px; }
        .online-count { background: #27ae60; color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; display: inline-block; margin-bottom: 10px; font-weight: bold; }
        .battle-field { display: flex; justify-content: space-around; align-items: center; height: 160px; background: white; border-radius: 15px; margin: 20px 0; position: relative; overflow: hidden; border: 2px solid #ddd; }
        .rope { width: 100%; height: 6px; background: #8b4513; position: absolute; z-index: 1; }
        .character { font-size: 60px; position: absolute; z-index: 2; top: 25px; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #player1 { left: 15%; } #player2 { right: 15%; }
        .quiz-card { background: var(--navy); color: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        input { width: 85%; padding: 15px; font-size: 22px; border-radius: 10px; border: none; margin-top: 15px; text-align: center; outline: none; }
        .btn-main { width: 95%; padding: 15px; background: #4caf50; color: white; border: none; border-radius: 10px; font-size: 22px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .stat-box { display: flex; justify-content: space-around; background: #fff; padding: 10px; border-radius: 10px; margin-top: 15px; font-size: 14px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="online-count">👥 Онлайн: <span id="user-count">...</span></div>

    <div id="lobby" style="background:white; padding:30px; border-radius:20px; max-width:400px; margin:20px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
        <h3>Тилди тандаңыз:</h3>
        <button onclick="setLang('kg')" style="padding:10px; width:45%;">Кыргызча</button>
        <button onclick="setLang('ru')" style="padding:10px; width:45%;">Русский</button>
        <hr>
        <h3>Топко кошул:</h3>
        <button onclick="joinTeam(1)" style="background:var(--blue); color:white; padding:15px; width:80%; border:none; border-radius:10px; margin-bottom:10px; font-weight:bold; cursor:pointer;">Көк Топ</button>
        <button onclick="joinTeam(2)" style="background:var(--red); color:white; padding:15px; width:80%; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Кызыл Топ</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div class="battle-field">
            <div class="rope"></div>
            <div id="rope-group" style="position: absolute; width: 100%; transition: 0.5s;">
                <div id="player1" class="character">🧑🏻‍💼</div>
                <div id="player2" class="character">👩🏻‍💼</div>
            </div>
        </div>
        <div class="quiz-card">
            <h2 id="question">Жүктөлүүдө...</h2>
            <input type="text" id="answer" placeholder="Жообун жаз..." autocomplete="off">
            <button class="btn-main" onclick="check()">GO!</button>
        </div>
        <div class="stat-box">
            <div style="color:var(--blue)">Көк: <span id="s1">0</span></div>
            <div style="color:var(--red)">Кызыл: <span id="s2">0</span></div>
        </div>
    </div>

    <script>
        // СКРИНШОТТОГУ ТУУРА ШИЛТЕМЕ КОШУЛДУ
        const firebaseConfig = {
            databaseURL: "https://germangame-b5626-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('game_state');
        const presenceRef = firebase.database().ref('online_users');

        // AI Үнү
        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'de-DE'; 
            utter.rate = 0.8;
            window.speechSynthesis.speak(utter);
        }

        // Онлайн башкаруу
        const myUserRef = presenceRef.push(true);
        myUserRef.onDisconnect().remove();
        presenceRef.on('value', snap => {
            document.getElementById('user-count').innerText = snap.numChildren();
        });

        let myTeam = 0;
        let selectedLang = 'kg';
        let currentWordIndex = 0;

        // Артиклдери жок таза сөздөр
        const words = [
            {kg: "Мышык", ru: "Кошка", n: "Katze"},
            {kg: "Энергия", ru: "Энергия", n: "Energie"},
            {kg: "Өз алдынча", ru: "Самостоятельно", n: "selbst"},
            {kg: "Шып", ru: "Потолок", n: "Decke"},
            {kg: "Таштанды", ru: "Мусор", n: "Müll"},
            {kg: "Келишим", ru: "Договор", n: "Vertrag"}
        ];

        function setLang(l) { selectedLang = l; }

        function joinTeam(t) {
            myTeam = t;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            nextWord();
        }

        function nextWord() {
            currentWordIndex = Math.floor(Math.random() * words.length);
            document.getElementById("question").innerText = selectedLang === 'kg' ? words[currentWordIndex].kg : words[currentWordIndex].ru;
            document.getElementById("answer").value = "";
        }

        function check() {
            let val = document.getElementById("answer").value.trim().toLowerCase();
            let correct = words[currentWordIndex].n.toLowerCase();

            db.once('value').then(snap => {
                let data = snap.val() || {pos: 0, s1: 0, s2: 0};
                if(val === correct) {
                    speak("Richtig! " + correct); // AI немисче сүйлөйт
                    if(myTeam === 1) { data.s1++; data.pos -= 40; } 
                    else { data.s2++; data.pos += 40; }
                    db.set(data);
                } else {
                    speak("Falsch!"); // AI ката дейт
                    alert("AI Жардамчы: Туура жооп - " + words[currentWordIndex].n);
                }
                nextWord();
            });
        }

        db.on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('rope-group').style.transform = `translateX(${data.pos}px)`;
                document.getElementById('s1').innerText = data.s1 || 0;
                document.getElementById('s2').innerText = data.s2 || 0;
            }
        });
    </script>
</body>
</html>
