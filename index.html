<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Немисче Battle Room</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; --navy: #1a237e; }
        body { 
            font-family: 'Segoe UI', sans-serif; text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 10px; color: #333; min-height: 100vh;
        }
        .screen { 
            display: none; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 30px; max-width: 400px; margin: 20px auto; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.3);
        }
        .active { display: block; }
        input { width: 85%; padding: 12px; margin: 10px; border-radius: 15px; border: 1px solid #ccc; font-size: 18px; text-align: center; }
        button { padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin: 5px; transition: 0.3s transform; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        .lang-active { background: #4caf50; color: white; }
        .battle-field { height: 120px; background: rgba(0,0,0,0.1); border-radius: 20px; margin: 15px 0; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #rope-group { position: absolute; width: 100%; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; justify-content: center; font-size: 50px; }
        .quiz-card { background: var(--navy); color: white; padding: 25px; border-radius: 25px; }
        .game-timer-ui { color: white; font-weight: bold; font-size: 22px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .share-box { margin-top: 15px; padding: 10px; background: rgba(76, 175, 80, 0.1); border-radius: 15px; font-size: 13px; border: 1px dashed #4caf50; color: #1b5e20; }
        .ai-badge { background: #000; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; font-size: 12px; letter-spacing: 2px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="ai-badge">GEMINI AI SYSTEM</div>
        <h2 style="color:var(--navy); margin-top:0;">Willkommen! 🇩🇪</h2>
        <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
            <button id="btn-kg" class="lang-btn lang-active" onclick="setLang('kg')">Кыргызча</button>
            <button id="btn-ru" class="lang-btn" onclick="setLang('ru')">Русский</button>
        </div>
        <hr style="opacity:0.2">
        <input type="text" id="user-name" placeholder="Атыңызды жазыңыз">
        <input type="text" id="room-id" placeholder="Бөлмө коду (мис: 123)">
        
        <div id="share-link-area" class="share-box" style="display:none;">
            Бул бөлмөгө досторду чакыруу:<br>
            <button onclick="copyShareLink()" style="background:#4caf50; color:white; font-size:12px; padding:8px 15px; margin-top:8px; border-radius:10px;">Шилтемени көчүрүү 🔗</button>
        </div>

        <div style="margin-top:15px;">
            <button class="btn-blue" style="width:100%" onclick="startApp(1)">Көк топко кир (🟦)</button>
            <button class="btn-red" style="width:100%" onclick="startApp(2)">Кызыл топко кир (🟥)</button>
        </div>
    </div>

    <div id="screen-game-container" style="display:none;">
        <div class="game-timer-ui">⏳ <span id="main-clock">06:00</span></div>
        <div style="color:white; font-weight:bold;">Сөздөр: <span id="total-words-display">0</span> | Таймер: <span id="q-timer">20</span>с</div>
        <div class="screen" style="display:block; margin-top:10px;">
            <div class="battle-field"><div id="rope-group">🧑🏻‍💼 🟦—🟥 👩🏻‍💼</div></div>
            <div class="quiz-card">
                <h3 id="question" style="font-size: 26px;">...</h3>
                <input type="text" id="answer" placeholder="Немисчесин жаз..." autocomplete="off">
                <button style="background:#4caf50; color:white; width:100%; font-size:20px;" onclick="check()">GO!</button>
            </div>
            <div style="display:flex; justify-content: space-around; margin-top:20px; font-weight:bold; font-size:20px;">
                <div style="color:var(--blue)">Көк: <span id="s1">0</span></div>
                <div style="color:var(--red)">Кызыл: <span id="s2">0</span></div>
            </div>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h2 style="color:var(--navy)">Оюн аяктады!</h2>
        <h1 id="winner-text">---</h1>
        <button class="btn-blue" onclick="location.reload()" style="width:100%">Кайра баштоо</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://germangame-b5626-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        let db, myTeam, roomPath;
        let qTimerInterval, timeLeft = 20, gameTime = 360;
        let selectedLang = 'kg';
        let usedIndexes = [];

        const allWords = [
            {kg: "Мышык", ru: "Кошка", n: "Katze"}, {kg: "Нан", ru: "Хлеб", n: "Brot"},
            {kg: "Мектеп", ru: "Школа", n: "Schule"}, {kg: "Китеп", ru: "Книга", n: "Buch"},
            {kg: "Суу", ru: "Вода", n: "Wasser"}, {kg: "Алма", ru: "Яблоко", n: "Apfel"},
            {kg: "Үй", ru: "Дом", n: "Haus"}, {kg: "Убакыт", ru: "Время", n: "Zeit"},
            {kg: "Күндүз", ru: "День", n: "Tag"}, {kg: "Түн", ru: "Ночь", n: "Nacht"},
            {kg: "Дос", ru: "Друг", n: "Freund"}, {kg: "Мугалим", ru: "Учитель", n: "Lehrer"},
            {kg: "Стол", ru: "Стол", n: "Tisch"}, {kg: "Орундук", ru: "Стул", n: "Stuhl"},
            {kg: "Терезе", ru: "Окно", n: "Fenster"}, {kg: "Эшик", ru: "Дверь", n: "Tür"},
            {kg: "Шаар", ru: "Город", n: "Stadt"}, {kg: "Өлкө", ru: "Страна", n: "Land"},
            {kg: "Машина", ru: "Машина", n: "Auto"}, {kg: "Акча", ru: "Деньги", n: "Geld"},
            {kg: "Дүкөн", ru: "Магазин", n: "Laden"}, {kg: "Көчө", ru: "Улица", n: "Straße"},
            {kg: "Күн", ru: "Солнце", n: "Sonne"}, {kg: "Ай", ru: "Луна", n: "Mond"},
            {kg: "Жылдыз", ru: "Звезда", n: "Stern"}, {kg: "Асман", ru: "Небо", n: "Himmel"},
            {kg: "Жумуш", ru: "Работа", n: "Arbeit"}, {kg: "Үй-бүлө", ru: "Семья", n: "Familie"}
        ];

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const r = urlParams.get('room');
            if (r) {
                document.getElementById('room-id').value = r;
                document.getElementById('share-link-area').style.display = 'block';
            }
        };

        document.getElementById('room-id').oninput = function() {
            document.getElementById('share-link-area').style.display = this.value.length > 0 ? 'block' : 'none';
        };

        function copyShareLink() {
            const roomCode = document.getElementById('room-id').value;
            const shareUrl = window.location.origin + window.location.pathname + "?room=" + roomCode;
            navigator.clipboard.writeText(shareUrl).then(() => alert("Шилтеме көчүрүлдү!"));
        }

        function setLang(l) {
            selectedLang = l;
            document.getElementById('btn-kg').className = l === 'kg' ? 'lang-btn lang-active' : 'lang-btn';
            document.getElementById('btn-ru').className = l === 'ru' ? 'lang-btn lang-active' : 'lang-btn';
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'de-DE'; utter.rate = 0.85;
            window.speechSynthesis.speak(utter);
        }

        function startApp(team) {
            let user = document.getElementById('user-name').value.trim();
            roomPath = document.getElementById('room-id').value.trim();
            if(!user || !roomPath) return alert("Маалыматты толтуруңуз!");
            myTeam = team;
            db = firebase.database().ref('rooms/' + roomPath);
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-game-container').style.display = 'block';
            initGame();
        }

        function initGame() {
            db.once('value', snap => {
                if(!snap.exists()) db.set({ pos: 0, s1: 0, s2: 0, totalWords: 0, startTime: Date.now() });
            });
            db.on('value', snap => {
                const data = snap.val(); if(!data) return;
                document.getElementById('s1').innerText = data.s1;
                document.getElementById('s2').innerText = data.s2;
                document.getElementById('total-words-display').innerText = data.totalWords;
                document.getElementById('rope-group').style.transform = `translateX(${data.pos}px)`;
                let remaining = gameTime - Math.floor((Date.now() - data.startTime) / 1000);
                if(remaining <= 0) endGame(data); else updateMainClock(remaining);
            });
            nextWord();
        }

        function nextWord() {
            if (usedIndexes.length === allWords.length) usedIndexes = [];
            let index;
            do { index = Math.floor(Math.random() * allWords.length); } while (usedIndexes.includes(index));
            usedIndexes.push(index);
            currentWordIndex = index;
            db.once('value').then(snap => { db.update({ totalWords: (snap.val().totalWords || 0) + 1 }); });
            document.getElementById("question").innerText = selectedLang === 'kg' ? allWords[index].kg : allWords[index].ru;
            document.getElementById("answer").value = "";
            document.getElementById("answer").focus();
            
            clearInterval(qTimerInterval);
            timeLeft = 20;
            document.getElementById('q-timer').innerText = timeLeft;
            qTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('q-timer').innerText = timeLeft;
                if(timeLeft <= 0) nextWord();
            }, 1000);
        }

        function check() {
            let val = document.getElementById("answer").value.trim().toLowerCase();
            let correct = allWords[currentWordIndex].n.toLowerCase();
            if(val === correct) {
                speak(allWords[currentWordIndex].n);
                db.once('value').then(snap => {
                    let d = snap.val();
                    if(myTeam === 1) { d.s1++; d.pos -= 40; } else { d.s2++; d.pos += 40; }
                    db.update(d);
                    nextWord();
                });
            } else {
                alert("Ката! Туурасы: " + allWords[currentWordIndex].n);
                nextWord();
            }
        }

        function updateMainClock(sec) {
            let m = Math.floor(sec / 60), s = sec % 60;
            document.getElementById('main-clock').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function endGame(data) {
            clearInterval(qTimerInterval); db.off();
            document.getElementById('screen-game-container').style.display = 'none';
            document.getElementById('screen-result').classList.add('active');
            let res = data.s1 > data.s2 ? "Көк топ жеңди! 🎉" : (data.s2 > data.s1 ? "Кызыл топ жеңди! 🎉" : "Тең чыгуу!");
            document.getElementById('winner-text').innerText = res;
        }
    </script>
</body>
</html>
