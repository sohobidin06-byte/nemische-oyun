<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Немисче Online Жарыш</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #3498db; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f7f6; margin: 0; padding: 15px; }
        .setup-screen { background: white; padding: 30px; border-radius: 20px; max-width: 400px; margin: 50px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .battle-field { display: flex; justify-content: space-around; align-items: center; height: 160px; background: white; border-radius: 15px; margin: 20px 0; position: relative; overflow: hidden; border: 2px solid #ddd; }
        .rope { width: 100%; height: 6px; background: #8b4513; position: absolute; z-index: 1; }
        .character { font-size: 60px; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: absolute; z-index: 2; top: 25px; }
        #player1 { left: 15%; } #player2 { right: 15%; }
        .quiz-card { background: #1a237e; color: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        input { width: 85%; padding: 15px; font-size: 22px; border-radius: 10px; border: none; margin-top: 15px; text-align: center; outline: none; }
        button { width: 95%; padding: 15px; background: #4caf50; color: white; border: none; border-radius: 10px; font-size: 22px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .team-btn { padding: 15px; margin: 10px; border: none; border-radius: 10px; color: white; font-size: 18px; cursor: pointer; width: 80%; }
        .score-board { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="lobby" class="setup-screen">
        <h2>Топту тандап кир:</h2>
        <button class="team-btn" style="background:var(--blue)" onclick="joinTeam(1)">Сол топ (Көк)</button>
        <button class="team-btn" style="background:var(--red)" onclick="joinTeam(2)">Оң топ (Кызыл)</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div class="score-board">
            <span style="color:var(--blue)">Көк: <span id="s1">0</span></span>
            <span style="color:var(--red)">Кызыл: <span id="s2">0</span></span>
        </div>

        <div class="battle-field">
            <div class="rope"></div>
            <div id="rope-group" style="position: absolute; width: 100%; transition: 0.5s;">
                <div id="player1" class="character">👲</div>
                <div id="player2" class="character">🤖</div>
            </div>
        </div>

        <div class="quiz-card">
            <h2 id="question">Сөз...</h2>
            <p id="team-info" style="font-size: 14px; opacity: 0.8;"></p>
            <input type="text" id="answer" placeholder="Немисчесин жаз..." autocomplete="off">
            <button onclick="check()">GO!</button>
        </div>
    </div>

    <script>
        // СИЗДИН FIREBASE ШИЛТЕМЕҢИЗ ТУУРАЛАНДЫ:
        const firebaseConfig = {
            databaseURL: "https://germangame-b5626-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('game_state');

        let myTeam = 0;
        let currentWordIndex = 0;

        // СӨЗДӨРДҮН ТИЗМЕСИ
        const words = [
            {k: "Энергия", n: "die Energie"}, {k: "Өз алдынча", n: "selbst"},
            {k: "Алмаштыруу", n: "wechseln"}, {k: "Шып", n: "die Decke"},
            {k: "Ыраазычылык", n: "der Dank"}, {k: "Эч нерсе", n: "nichts"},
            {k: "Ручка", n: "der Kugelschreiber"}, {k: "Кулпу", n: "das Schloss"},
            {k: "Сүрөт (картина)", n: "das Bild"}, {k: "Дубал", n: "die Wand"},
            {k: "Мышык", n: "die Katze"}, {k: "Тынчтык", n: "die Ruhe"},
            {k: "Тоскоол болуу", n: "stören"}, {k: "Карандаш", n: "der Stift"},
            {k: "Куруу", n: "bauen"}, {k: "Өсүмдүк", n: "die Pflanze"},
            {k: "Таштанды", n: "der Müll"}, {k: "Билдирүү", n: "die Mitteilung"},
            {k: "Пластик", n: "das Plastik"}, {k: "Келишим", n: "der Vertrag"},
            {k: "Лифт", n: "der Aufzug"}, {k: "Почта кутусу", n: "der Briefkasten"}
        ];

        function joinTeam(team) {
            myTeam = team;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('team-info').innerText = team === 1 ? "Сиз КӨК топтосуз" : "Сиз КЫЗЫЛ топтосуз";
            nextWord();
        }

        function nextWord() {
            currentWordIndex = Math.floor(Math.random() * words.length);
            document.getElementById("question").innerText = "Кыргызча: " + words[currentWordIndex].k;
        }

        function check() {
            let val = document.getElementById("answer").value.trim().toLowerCase();
            let correct = words[currentWordIndex].n.toLowerCase();
            let correctSimple = correct.replace("die ", "").replace("der ", "").replace("das ", "");

            if(val === correct || val === correctSimple) {
                db.once('value').then(snap => {
                    let data = snap.val() || {score1: 0, score2: 0, pos: 0};
                    if(myTeam === 1) { data.score1++; data.pos -= 35; }
                    else { data.score2++; data.pos += 35; }
                    db.set(data);
                });
                document.getElementById("answer").value = "";
                nextWord();
            } else {
                alert("Ката! Туура жооп: " + words[currentWordIndex].n);
            }
        }

        // БАЗАНЫ ТЫНБАЙ КӨЗӨМӨЛДӨӨ
        db.on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('rope-group').style.transform = `translateX(${data.pos}px)`;
                document.getElementById('s1').innerText = data.score1;
                document.getElementById('s2').innerText = data.score2;

                if(data.score1 >= 10) { alert("КӨК ТОП ЖЕҢДИ! 🔥"); db.set({score1:0, score2:0, pos:0}); }
                if(data.score2 >= 10) { alert("КЫЗЫЛ ТОП ЖЕҢДИ! 🔥"); db.set({score1:0, score2:0, pos:0}); }
            }
        });
    </script>
</body>
</html>
